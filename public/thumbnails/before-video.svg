<svg width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBefore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="200" rx="8" fill="url(#bgBefore)"/>
  
  <!-- Poor Quality Indicators -->
  <g opacity="0.7">
    <!-- Glitchy bars -->
    <rect x="20" y="30" width="260" height="3" fill="#e74c3c" opacity="0.6"/>
    <rect x="20" y="40" width="200" height="3" fill="#e74c3c" opacity="0.4"/>
    <rect x="20" y="50" width="240" height="3" fill="#e74c3c" opacity="0.5"/>
    
    <!-- Broken waveform -->
    <rect x="30" y="80" width="2" height="15" fill="#666"/>
    <rect x="35" y="75" width="2" height="25" fill="#666"/>
    <rect x="40" y="85" width="2" height="10" fill="#666"/>
    <rect x="45" y="70" width="2" height="35" fill="#666"/>
    <rect x="50" y="80" width="2" height="15" fill="#666"/>
    <!-- Gap indicating audio break -->
    <rect x="60" y="80" width="2" height="15" fill="#e74c3c"/>
    <rect x="65" y="75" width="2" height="25" fill="#e74c3c"/>
    <!-- More broken audio -->
    <rect x="75" y="85" width="2" height="10" fill="#666"/>
    <rect x="80" y="70" width="2" height="35" fill="#666"/>
    <rect x="85" y="80" width="2" height="15" fill="#666"/>
  </g>
  
  <!-- Error/Warning Icons -->
  <g opacity="0.8">
    <circle cx="250" cy="50" r="12" fill="url(#errorGrad)"/>
    <path d="M245 50 L255 50 M250 45 L250 55" stroke="white" stroke-width="2"/>
    
    <circle cx="220" cy="70" r="8" fill="#f39c12"/>
    <path d="M220 65 L220 72 M220 75 L220 75" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Poor Quality Text Overlay -->
  <rect x="50" y="120" width="200" height="60" rx="6" fill="#1a1a1a" opacity="0.8"/>
  <rect x="60" y="135" width="80" height="4" rx="2" fill="#e74c3c" opacity="0.7"/>
  <rect x="60" y="145" width="120" height="3" rx="1.5" fill="#666" opacity="0.6"/>
  <rect x="60" y="155" width="100" height="3" rx="1.5" fill="#666" opacity="0.5"/>
  <rect x="60" y="165" width="90" height="3" rx="1.5" fill="#666" opacity="0.4"/>
  
  <!-- Static/Noise Pattern -->
  <g opacity="0.3">
    <rect x="10" y="10" width="1" height="1" fill="#e74c3c"/>
    <rect x="15" y="15" width="1" height="1" fill="#e74c3c"/>
    <rect x="25" y="12" width="1" height="1" fill="#e74c3c"/>
    <rect x="35" y="18" width="1" height="1" fill="#e74c3c"/>
    <rect x="45" y="8" width="1" height="1" fill="#e74c3c"/>
    <rect x="55" y="22" width="1" height="1" fill="#e74c3c"/>
    <rect x="65" y="16" width="1" height="1" fill="#e74c3c"/>
    <rect x="75" y="25" width="1" height="1" fill="#e74c3c"/>
    <rect x="85" y="5" width="1" height="1" fill="#e74c3c"/>
    <rect x="95" y="28" width="1" height="1" fill="#e74c3c"/>
  </g>
  
  <!-- Play Button (Broken) -->
  <circle cx="150" cy="100" r="20" fill="#666" opacity="0.6"/>
  <polygon points="145,95 145,105 155,100" fill="#999"/>
  <path d="M140 90 L160 110 M160 90 L140 110" stroke="#e74c3c" stroke-width="2" opacity="0.7"/>
</svg>