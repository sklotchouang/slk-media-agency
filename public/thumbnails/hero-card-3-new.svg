<svg width="280" height="550" viewBox="0 0 280 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="280" height="550" rx="20" fill="#1a2a3e"/>
  
  <!-- Central hub -->
  <circle cx="140" cy="200" r="40" fill="#3ba7e7" opacity="0.8"/>
  <circle cx="140" cy="200" r="30" fill="#1a1a1a" stroke="#3ba7e7" stroke-width="2"/>
  <text x="140" y="195" text-anchor="middle" fill="#3ba7e7" font-size="10">PODCAST</text>
  <text x="140" y="208" text-anchor="middle" fill="white" font-size="8">CONTENT</text>
  
  <!-- Platform connections -->
  <!-- YouTube -->
  <line x1="140" y1="160" x2="140" y2="100" stroke="#3ba7e7" stroke-width="2"/>
  <rect x="120" y="80" width="40" height="30" rx="5" fill="#ff0000"/>
  <polygon points="130,90 130,100 145,95" fill="white"/>
  <text x="140" y="125" text-anchor="middle" fill="white" font-size="8">YouTube</text>
  
  <!-- Instagram -->
  <line x1="180" y1="170" x2="220" y2="130" stroke="#3ba7e7" stroke-width="2"/>
  <rect x="210" y="110" width="30" height="30" rx="8" fill="#e4405f"/>
  <circle cx="225" cy="125" r="6" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="230" cy="120" r="2" fill="white"/>
  <text x="225" y="155" text-anchor="middle" fill="white" font-size="8">Instagram</text>
  
  <!-- TikTok -->
  <line x1="180" y1="230" x2="220" y2="270" stroke="#3ba7e7" stroke-width="2"/>
  <rect x="210" y="260" width="30" height="30" rx="5" fill="#000"/>
  <path d="M220 270 Q225 265 230 270 Q225 275 220 270" fill="#ff0050"/>
  <path d="M225 270 Q230 265 235 270 Q230 275 225 270" fill="#00f2ea"/>
  <text x="225" y="305" text-anchor="middle" fill="white" font-size="8">TikTok</text>
  
  <!-- LinkedIn -->
  <line x1="140" y1="240" x2="140" y2="300" stroke="#3ba7e7" stroke-width="2"/>
  <rect x="120" y="300" width="40" height="30" rx="5" fill="#0077b5"/>
  <text x="140" y="320" text-anchor="middle" fill="white" font-size="12">in</text>
  <text x="140" y="345" text-anchor="middle" fill="white" font-size="8">LinkedIn</text>
  
  <!-- Twitter/X -->
  <line x1="100" y1="230" x2="60" y2="270" stroke="#3ba7e7" stroke-width="2"/>
  <rect x="40" y="260" width="30" height="30" rx="5" fill="#1da1f2"/>
  <text x="55" y="280" text-anchor="middle" fill="white" font-size="14">𝕏</text>
  <text x="55" y="305" text-anchor="middle" fill="white" font-size="8">Twitter</text>
  
  <!-- Facebook -->
  <line x1="100" y1="170" x2="60" y2="130" stroke="#3ba7e7" stroke-width="2"/>
  <rect x="40" y="110" width="30" height="30" rx="5" fill="#1877f2"/>
  <text x="55" y="130" text-anchor="middle" fill="white" font-size="16">f</text>
  <text x="55" y="155" text-anchor="middle" fill="white" font-size="8">Facebook</text>
  
  <!-- Spotify -->
  <line x1="100" y1="200" x2="40" y2="200" stroke="#3ba7e7" stroke-width="2"/>
  <circle cx="25" cy="200" r="15" fill="#1db954"/>
  <path d="M18 195 Q25 190 32 195" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M18 200 Q25 195 32 200" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M18 205 Q25 200 32 205" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <text x="25" y="230" text-anchor="middle" fill="white" font-size="8">Spotify</text>
  
  <!-- Apple Podcasts -->
  <line x1="180" y1="200" x2="240" y2="200" stroke="#3ba7e7" stroke-width="2"/>
  <circle cx="255" cy="200" r="15" fill="#000"/>
  <circle cx="255" cy="195" r="8" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="255" cy="195" r="4" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="255" cy="195" r="1" fill="white"/>
  <text x="255" y="230" text-anchor="middle" fill="white" font-size="8">Apple</text>
  
  <!-- Distribution stats -->
  <rect x="40" y="360" width="200" height="80" rx="10" fill="#2a2a2a"/>
  
  <!-- Stats grid -->
  <text x="50" y="380" fill="#3ba7e7" font-size="10">📊 Distribution Analytics</text>
  
  <text x="50" y="400" fill="white" font-size="9">🎯 8 Platforms</text>
  <text x="140" y="400" fill="white" font-size="9">⚡ Auto-Sync</text>
  
  <text x="50" y="415" fill="white" font-size="9">📈 +340% Reach</text>
  <text x="140" y="415" fill="white" font-size="9">🕒 Real-time</text>
  
  <text x="50" y="430" fill="white" font-size="9">🎨 Custom Format</text>
  <text x="140" y="430" fill="white" font-size="9">📱 Mobile-First</text>
  
  <!-- Automation indicator -->
  <rect x="60" y="460" width="160" height="30" rx="15" fill="#3ba7e7" opacity="0.2"/>
  <circle cx="80" cy="475" r="3" fill="#44ff44"/>
  <text x="90" y="479" fill="#44ff44" font-size="9">● AUTOMATED DISTRIBUTION</text>
  
  <!-- Network visualization -->
  <circle cx="140" cy="200" r="60" fill="none" stroke="#3ba7e7" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <circle cx="140" cy="200" r="80" fill="none" stroke="#3ba7e7" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <circle cx="140" cy="200" r="100" fill="none" stroke="#3ba7e7" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
  
  <!-- Data flow particles -->
  <circle cx="120" cy="150" r="2" fill="#3ba7e7" opacity="0.6"/>
  <circle cx="200" cy="180" r="2" fill="#3ba7e7" opacity="0.6"/>
  <circle cx="160" cy="250" r="2" fill="#3ba7e7" opacity="0.6"/>
  <circle cx="80" cy="220" r="2" fill="#3ba7e7" opacity="0.6"/>
  
  <!-- Title -->
  <text x="140" y="50" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Multi-Platform</text>
  <text x="140" y="65" text-anchor="middle" fill="#3ba7e7" font-size="12">Distribution</text>
</svg>